lanes:
  - id: sbp:lane:cjm
    name: Customer Journey
    kind: cjm
    position:
      x: -60
      'y': 100
    size:
      width: 2060
      height: 150
  - id: sbp:lane:business-unit
    name: 業務部門(現場)
    kind: team
    description: AI を実務に組み込む当事者。EM の「必要な行動」はこのレーンのタスクにぶら下がる。
    position:
      x: -60
      'y': 320
    size:
      width: 2060
      height: 220
  - id: sbp:lane:control
    name: 統制設計(法務 / 情報セキュリティ / IT)
    kind: team
    description: 部門別ガードレールと必要条件の統制(データ保護・権限・監査)を設計する。統制は「使ってよい状態」までを作る。
    position:
      x: -60
      'y': 570
    size:
      width: 2060
      height: 200
  - id: sbp:lane:enablement
    name: enablement・推進
    kind: team
    description: 効くユースケースを絞って伴走し、職務再定義を設計する。配って終わりにせず「使って効く状態」を作る。
    position:
      x: -60
      'y': 800
    size:
      width: 2060
      height: 220
  - id: sbp:lane:management
    name: 経営・PMO
    kind: team
    description: reach と value を分けた計測軸を設計し、ベンダーロックインの出口を持つ。利用率の向上をゴールにしない。
    position:
      x: -60
      'y': 1050
    size:
      width: 2060
      height: 200
tasks:
  - id: sbp:task:redesign-workflow
    lane: sbp:lane:business-unit
    name: ワークフローを再設計して業務に組み込む
    description: 統制は必要条件にすぎない。成果は業務そのものを作り直したか(ワークフロー再設計)で決まる。
    source_id: cjm:action:focus-usecases
    position:
      x: 940
      'y': 60
  - id: sbp:task:measure-value
    lane: sbp:lane:business-unit
    name: value 指標で自業務の成果を測る
    description: 配布率や利用率(reach)でなく、EBIT 寄与・業務時間削減・品質(value)で自業務の効き目を測る。
    source_id: cjm:action:confirm-value
    position:
      x: 1400
      'y': 60
  - id: sbp:task:define-dept-guardrails
    lane: sbp:lane:control
    name: 部門別ガードレールを定義する
    description: 人事・法務・経理・マーケで当てるべき統制が異なる。配布範囲が広いほど一律ルールは破綻する。
    source_id: cjm:action:blocked-by-rules
    position:
      x: 600
      'y': 60
  - id: sbp:task:setup-controls
    lane: sbp:lane:control
    name: データ保護・権限・監査を必要条件として先に整える
    description: SSO/SCIM/監査/レジデンシーは「使ってよい状態」を作る前提。ただし十分条件ではない。
    source_id: cjm:action:licensed-unclear
    position:
      x: 40
      'y': 60
  - id: sbp:task:select-usecases
    lane: sbp:lane:enablement
    name: 効くユースケース(平均3.5)を選定し伴走する
    description: 全部門に配って全部やるのでなく、効く業務を少数に絞って深くやる。先行企業は平均3.5に集中する。
    source_id: cjm:action:focus-usecases
    position:
      x: 820
      'y': 60
  - id: sbp:task:coach-guardrail-use
    lane: sbp:lane:enablement
    name: 部門別ガードレールの使い方を伴走する
    description: ガードレールを現場が迷わず使える手順に落とし、人手レビューの型を伴走で移転する。
    source_id: cjm:action:work-within-guardrails
    position:
      x: 1160
      'y': 60
  - id: sbp:task:redefine-roles
    lane: sbp:lane:enablement
    name: 職務再定義と評価制度を設計する
    description: 誰がどの業務を AI 前提で持つかを明文化し、人間と機械の組み合わせの成果を測る評価へ移す。
    source_id: cjm:action:redefine-role
    position:
      x: 1720
      'y': 60
  - id: sbp:task:split-reach-value
