kind: cjm
version: '1.0'
id: cjm:enterprise-reach-value
persona:
  name: 業務部門の担当者(全社AI配布後・非技術を含む)
  description: >-
    ChatGPT/Codex を全社配布された人事・法務・経理・マーケなどの業務部門担当者。
    このマップでは AI enablement サービスの「内部顧客」として扱う。
    配布された(reach)だけでは業務成果(value)には化けない。
    出典: OpenAI の Samsung 全社展開 blog(2026-06-21。Samsung 固有の成果指標はゼロ)
    + McKinsey/BCG の独立調査(配布が広くても成果到達は低位に収束)。
phases:
  - id: cjm:phase:distributed
    name: 配布された
  - id: cjm:phase:trial
    name: 個人で試す
  - id: cjm:phase:embed
    name: 業務に組み込む
  - id: cjm:phase:value
    name: 成果で回る
  - id: cjm:phase:redefine
    name: 職務が変わる
actions:
  - id: cjm:action:licensed-unclear
    name: ライセンスは来たが使い道が分からない
    phase: cjm:phase:distributed
    touchpoints:
      - 全社発表
      - ライセンス通知メール
    thoughts_feelings:
      - 配られたが自分の業務でどう使うのか分からない
      - 部門の規制的に使ってよいのか不安
    emotion_score: -1
  - id: cjm:action:generic-trial
    name: 汎用の使い方で個人効率化にとどまる
    phase: cjm:phase:trial
    touchpoints:
      - ChatGPT
      - 個人のブラウザ
    thoughts_feelings:
      - 便利だが業務成果に効いている実感がない
      - 配布数や利用率だけが増えていく
    emotion_score: 0
  - id: cjm:action:blocked-by-rules
    name: 部門規制が曖昧で本業務に踏み込めない
    phase: cjm:phase:trial
    touchpoints:
      - 社内規程
      - 法務・情報セキュリティへの問い合わせ
    thoughts_feelings:
      - 守秘・監査・差別リスクの線引きが曖昧で本業務に使えない
      - 一律ルールだけでは部門固有の規制に足りない
    emotion_score: -2
  - id: cjm:action:focus-usecases
    name: ユースケースを絞ってワークフローを再設計する
    phase: cjm:phase:embed
    touchpoints:
      - 業務フロー図
      - enablement チームの伴走
    thoughts_feelings:
      - 効く業務を少数に絞ると深く効く
      - 全部に配って全部やるより、選んで深くやる
    emotion_score: 1
  - id: cjm:action:work-within-guardrails
    name: 部門別ガードレールの内側で使う
    phase: cjm:phase:embed
    touchpoints:
      - 部門別ガードレール
      - 人手レビューの手順
    thoughts_feelings:
      - 人手レビューや入力制限が明確で安心して本業務に使える
      - 部門の規制リスクに合った統制になっている
    emotion_score: 1
  - id: cjm:action:confirm-value
    name: value 指標で成果を確認する
    phase: cjm:phase:value
    touchpoints:
      - value ダッシュボード
      - 業務時間・品質の実測
    thoughts_feelings:
      - EBIT 寄与や業務時間削減で効いているのが見える
      - 配布数を成果と取り違えずに済む
    emotion_score: 2
  - id: cjm:action:redefine-role
    name: 職務を AI 前提で再定義する
    phase: cjm:phase:redefine
    touchpoints:
      - 職務記述書
      - 評価制度
    thoughts_feelings:
      - 誰がどの業務を AI 前提で持つかが明文化された
      - agent boss / orchestrator のような差配役ができた
    emotion_score: 1
---
kind: sbp
version: '1.0'
