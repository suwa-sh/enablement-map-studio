---
kind: outcome
version: '1.0'
id: oc:enterprise-reach-value
kgi:
  id: oc:kgi
  name: 全社に配布した AI を部門横断で成果(value)に化けさせる(配布≠成果を解消)
primary_csf:
  id: oc:csf
  kgi_id: oc:kgi
  source_id: sbp:task:split-reach-value
  rationale: >-
    配布数(reach)を成果と取り違えると、必要条件(ワークフロー再設計・職務再定義)への
    投資が止まる。OpenAI の Samsung 全社展開の発表は「全社配布(reach)の条件が整った」
    宣言であり、Samsung 固有の value 指標はゼロだった。value を reach と分けた独立 KPI
    で測ることが、成果への投資を駆動する。
primary_kpi:
  id: oc:kpi
  csf_id: oc:csf
  name: value 実証率(重点ユースケースのうち業務成果を実証できた割合)
  definition: >-
    分子 = EBIT 寄与・業務時間削減・品質のいずれかを実証できた重点ユースケース数 /
    分母 = 着手した重点ユースケース数。ライセンス配布率・WAU などの reach 指標とは
    切り離して測る。単独では評価せず reach 指標(配布率)と緊張させて併読し、
    四半期ごとに更新する。独立調査の収束数値(McKinsey 39% / BCG 26% など)は
    指標定義が異なるため横比較しない(解説の参照表を見る)。
  unit: '%'
  target: 50
---
kind: em
version: '1.0'
id: em:enterprise-reach-value
outcomes:
  - id: em:outcome:value-realization
    source_id: oc:kpi
actions:
  - id: em:act:split-reach-value
    name: reach と value を別 KPI で設計する
    description: >-
      【計測の分離】ライセンス配布数・WAU は reach 指標にすぎない。EBIT 寄与・
      業務時間削減・品質を value 指標として最初から別 KPI で測る。配布を成果と
      取り違えると必要条件への投資が止まる。
    source_id: sbp:task:split-reach-value
  - id: em:act:focus-usecases
    name: 効くユースケースを平均3.5に絞る
    description: >-
      【集中】全部門に配って全部やるのでなく、効く業務を選んで深くやる。
      先行企業は平均3.5ユースケースに集中する(独立調査。詳細は解説参照)。
    source_id: sbp:task:select-usecases
  - id: em:act:redesign-workflow
    name: ワークフローを再設計する(十分条件)
    description: >-
      【十分条件】統制は「使ってよい状態」を作る必要条件にすぎない。成果は
      業務そのものを作り直したか(ワークフロー再設計)で決まる。
    source_id: sbp:task:redesign-workflow
  - id: em:act:setup-controls
    name: 統制を必要条件として先に整える
    description: >-
      【必要条件】SSO/SCIM/監査/レジデンシーは「使ってよい状態」を作る前提。
      ただし十分条件ではない(MIT の研究は成果不発の主因をワークフロー統合と
      組織学習の欠如に置く。この 95% 系の数値は標本不一致・査読前で[要再検証]。
      詳細と留保は解説参照)。
    source_id: sbp:task:setup-controls
  - id: em:act:guardrail-hr
    name: 人事のガードレールを当てる
    description: >-
      【部門別統制・人事】リスク = 採用・評価での差別、適用法令。
      統制例 = AI 出力の人手レビュー、選考での自動判定の制限。
    source_id: sbp:task:define-dept-guardrails
  - id: em:act:guardrail-legal
    name: 法務のガードレールを当てる
    description: >-
      【部門別統制・法務】リスク = 守秘義務、引用の正確性。
      統制例 = 顧客データの入力制限、出力の弁護士確認。
    source_id: sbp:task:define-dept-guardrails
  - id: em:act:guardrail-finance
    name: 経理のガードレールを当てる
    description: >-
      【部門別統制・経理】リスク = 財務統制、監査証跡。
      統制例 = 数値の根拠提示の義務化、承認フローの維持。
    source_id: sbp:task:define-dept-guardrails
  - id: em:act:guardrail-marketing
    name: マーケのガードレールを当てる
    description: >-
      【部門別統制・マーケ】リスク = 著作権、ブランド毀損。
      統制例 = 生成物の権利確認、公開前の人手チェック。
    source_id: sbp:task:define-dept-guardrails
  - id: em:act:redefine-role
    name: 職務を AI 前提で再定義する
    description: >-
      【職務再定義】置換の単位はジョブよりタスク。誰がどの業務を AI 前提で持つかを
      明文化し、agent boss / orchestrator のような差配役を設ける。過剰な置換は
      品質低下・顧客離反を招くため段階的に進める。
    source_id: sbp:task:redefine-roles
  - id: em:act:vendor-exit
    name: ベンダーロックインの出口を設計する
    description: >-
      【出口設計】単一ベンダー標準化の便益と引き換えに、冗長性・移植性・
      契約条件の見直し条項を設計に含める。
    source_id: sbp:task:vendor-exit
skills:
  - id: em:skill:kpi-design
    name: reach/value を分離した KPI 設計
    action_id: em:act:split-reach-value
    learnings:
      - title: McKinsey - The State of AI in 2025
        url: https://www.mckinsey.com/capabilities/quantumblack/our-insights/the-state-of-ai
      - title: BCG - Where's the Value in AI?
        url: https://www.bcg.com/publications/2024/wheres-value-in-ai
  - id: em:skill:usecase-redesign
    name: ユースケース選定とワークフロー再設計
    action_id: em:act:redesign-workflow
  - id: em:skill:controls-baseline
    name: 統制ベースライン設計(SSO/SCIM/監査/レジデンシー)
    action_id: em:act:setup-controls
  - id: em:skill:guardrail-hr-design
    name: 人事ガードレール設計(差別・適用法令の見極め)
    action_id: em:act:guardrail-hr
  - id: em:skill:guardrail-legal-design
    name: 法務ガードレール設計(守秘・引用精度の見極め)
    action_id: em:act:guardrail-legal
  - id: em:skill:guardrail-finance-design
    name: 経理ガードレール設計(財務統制・監査証跡の見極め)
    action_id: em:act:guardrail-finance
  - id: em:skill:guardrail-marketing-design
    name: マーケガードレール設計(著作権・ブランド毀損の見極め)
    action_id: em:act:guardrail-marketing
  - id: em:skill:role-redesign
    name: 職務再定義と評価制度の設計
    action_id: em:act:redefine-role
knowledge:
  - id: em:knowledge:samsung-blog
    name: Samsung 全社展開の一次発表(配布=reach の宣言、value 指標ゼロ)
    action_id: em:act:split-reach-value
    url: https://openai.com/index/samsung-electronics-chatgpt-codex-deployment/
  - id: em:knowledge:mckinsey-state
    name: 配布≠成果の収束(McKinsey State of AI 2025)
    action_id: em:act:split-reach-value
    url: https://www.mckinsey.com/capabilities/quantumblack/our-insights/the-state-of-ai
  - id: em:knowledge:bcg-value
    name: スケーリングギャップ(BCG Where's the Value in AI?)
    action_id: em:act:redesign-workflow
    url: https://www.bcg.com/publications/2024/wheres-value-in-ai
  - id: em:knowledge:bcg-radar
    name: significant value 実現は約25%(BCG AI Radar 2025)
    action_id: em:act:focus-usecases
    url: https://www.bcg.com/publications/2025/closing-the-ai-impact-gap
